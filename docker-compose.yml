services:
  postgres:
    image: postgres:15-alpine
    container_name: mes_postgres
    restart: always
    environment:
      POSTGRES_USER: mes_user
      POSTGRES_PASSWORD: mes_password
      POSTGRES_DB: mes_db
    ports:
      - "5433:5432" # <-- Изменили порт хоста на 5433 
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
