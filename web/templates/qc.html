<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Паспорт ОТК — MES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #e2e8f0);
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .input-field {
            background: var(--tg-theme-secondary-bg-color, #1e293b);
            color: var(--tg-theme-text-color, #e2e8f0);
            border: 1px solid rgba(148, 163, 184, 0.2);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
            outline: none;
        }

        .input-readonly {
            background: rgba(30, 41, 59, 0.5);
            color: #94a3b8;
            border: 1px dashed rgba(148, 163, 184, 0.2);
        }

        .label-text {
            color: var(--tg-theme-hint-color, #94a3b8);
        }

        .section-title {
            color: #ef4444;
            border-bottom: 1px solid rgba(239, 68, 68, 0.3);
        }

        .success-overlay {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
        }

        @keyframes checkmark {
            0% {
                transform: scale(0);
                opacity: 0
            }

            50% {
                transform: scale(1.2)
            }

            100% {
                transform: scale(1);
                opacity: 1
            }
        }

        .animate-check {
            animation: checkmark 0.4s ease-out forwards;
        }

        .block-section {
            display: none;
        }

        .checkbox-custom {
            accent-color: #ef4444;
            width: 20px;
            height: 20px;
        }

        .pipe-info {
            background: var(--tg-theme-secondary-bg-color, #1e293b);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body class="min-h-screen p-4">
    <div class="text-center mb-6">
        <div class="text-3xl mb-2">📋</div>
        <h1 class="text-xl font-bold">Паспорт ОТК</h1>
        <p class="text-sm label-text mt-1">Контроль качества труб</p>
    </div>
    <form id="qcForm" class="space-y-4 max-w-md mx-auto">
        <div>
            <label class="block text-sm font-medium label-text mb-1.5">Труба</label>
            <select id="pipe_id" required class="input-field w-full rounded-xl px-4 py-3 text-base appearance-none">
                <option value="" disabled selected>Выберите трубу</option>
                {% for pipe in pipes %}
                <option value="{{ pipe.id }}">{{ pipe.serial_number }} ({{ pipe.status.value }})</option>
                {% endfor %}
            </select>
        </div>
        <div id="pipeInfo" class="pipe-info rounded-xl p-3 text-sm hidden">
            <span class="label-text">Статус:</span> <b id="infoStatus">—</b> &nbsp;|&nbsp;
            <span class="label-text">DN:</span> <b id="infoDN">—</b>
        </div>
        <!-- Блок 1: Песок -->
        <div id="block-sand" class="block-section space-y-3">
            <p class="section-title text-sm font-semibold pb-1 mb-2">🪨 Толщина песчаных слоёв</p>
            <div><label class="block text-sm font-medium label-text mb-1">Толщина слоя 1 (мм)</label>
                <input type="number" id="sand_layer_1_mm" step="0.01" min="0" placeholder="0.00"
                    class="input-field w-full rounded-xl px-4 py-3 text-base">
            </div>
            <div><label class="block text-sm font-medium label-text mb-1">Толщина слоя 2 (мм)</label>
                <input type="number" id="sand_layer_2_mm" step="0.01" min="0" placeholder="0.00"
                    class="input-field w-full rounded-xl px-4 py-3 text-base">
            </div>
        </div>
        <!-- Блок 2: Разрешение -->
        <div id="block-approval" class="block-section space-y-3">
            <p class="section-title text-sm font-semibold pb-1 mb-2">✅ Разрешение на токарку</p>
            <div class="flex items-center gap-3 py-2">
                <input type="checkbox" id="turning_approved" class="checkbox-custom">
                <label for="turning_approved" class="text-sm font-medium">Разрешить токарную обработку</label>
            </div>
        </div>
        <!-- Блок 3: Геометрия -->
        <div id="block-geometry" class="block-section space-y-3">
            <p class="section-title text-sm font-semibold pb-1 mb-2">📐 Геометрия</p>
            <div><label class="block text-sm font-medium label-text mb-1">Длина окр. трубы (мм)</label>
                <input type="number" id="pipe_circumference_mm" step="0.01" min="0" placeholder="0.00"
                    class="input-field w-full rounded-xl px-4 py-3 text-base">
            </div>
            <div><label class="block text-sm font-medium label-text mb-1">Длина окр. раструба (мм)</label>
                <input type="number" id="bell_circumference_mm" step="0.01" min="0" placeholder="0.00"
                    class="input-field w-full rounded-xl px-4 py-3 text-base">
            </div>
            <div><label class="block text-sm font-medium label-text mb-1">Наружный DN трубы (мм)</label>
                <input type="number" id="outer_dn_mm" step="0.01" min="0" placeholder="0.00"
                    class="input-field w-full rounded-xl px-4 py-3 text-base">
            </div>
            <div><label class="block text-sm font-medium label-text mb-1">Внутренний DN (мм) — из задания</label>
                <input type="number" id="inner_dn_mm" readonly
                    class="input-readonly w-full rounded-xl px-4 py-3 text-base cursor-not-allowed">
            </div>
            <div><label class="block text-sm font-medium label-text mb-1">Толщина стенки (мм) — авторасчёт</label>
                <input type="number" id="wall_thickness_mm" readonly
                    class="input-readonly w-full rounded-xl px-4 py-3 text-base cursor-not-allowed">
            </div>
            <div><label class="block text-sm font-medium label-text mb-1">Толщина стенки раструба (мм)</label>
                <input type="number" id="bell_wall_thickness_mm" step="0.01" min="0" placeholder="0.00"
                    class="input-field w-full rounded-xl px-4 py-3 text-base">
            </div>
            <div><label class="block text-sm font-medium label-text mb-1">Наружный ∅ ниппеля (мм)</label>
                <input type="number" id="nipple_outer_diameter_mm" step="0.01" min="0" placeholder="0.00"
                    class="input-field w-full rounded-xl px-4 py-3 text-base">
            </div>
            <div><label class="block text-sm font-medium label-text mb-1">∅ канала 1 (мм)</label>
                <input type="number" id="channel_diameter_1_mm" step="0.01" min="0" placeholder="0.00"
                    class="input-field w-full rounded-xl px-4 py-3 text-base">
            </div>
            <div><label class="block text-sm font-medium label-text mb-1">∅ канала 2 (мм)</label>
                <input type="number" id="channel_diameter_2_mm" step="0.01" min="0" placeholder="0.00"
                    class="input-field w-full rounded-xl px-4 py-3 text-base">
            </div>
            <div><label class="block text-sm font-medium label-text mb-1">Глубина каналов (мм)</label>
                <input type="number" id="channel_depth_mm" step="0.01" min="0" placeholder="0.00"
                    class="input-field w-full rounded-xl px-4 py-3 text-base">
            </div>
            <div><label class="block text-sm font-medium label-text mb-1">Ширина каналов (мм)</label>
                <input type="number" id="channel_width_mm" step="0.01" min="0" placeholder="0.00"
                    class="input-field w-full rounded-xl px-4 py-3 text-base">
            </div>
            <div><label class="block text-sm font-medium label-text mb-1">Длина обработанной части (мм)</label>
                <input type="number" id="machined_length_mm" step="0.01" min="0" placeholder="0.00"
                    class="input-field w-full rounded-xl px-4 py-3 text-base">
            </div>
        </div>
        <!-- Блок 4: Финал -->
        <div id="block-final" class="block-section space-y-3">
            <p class="section-title text-sm font-semibold pb-1 mb-2">🏆 Финальный контроль</p>
            <div><label class="block text-sm font-medium label-text mb-1">Замечания</label>
                <textarea id="visual_inspection_notes" rows="3" placeholder="Описание дефектов или «Без замечаний»..."
                    class="input-field w-full rounded-xl px-4 py-3 text-base resize-none"></textarea>
            </div>
            <div><label class="block text-sm font-medium label-text mb-1.5">Вердикт</label>
                <select id="final_verdict" class="input-field w-full rounded-xl px-4 py-3 text-base appearance-none">
                    <option value="" disabled selected>Выберите вердикт</option>
                    <option value="passed">✅ Годен</option>
                    <option value="rejected">❌ Брак</option>
                </select>
            </div>
        </div>
    </form>
    <div id="successOverlay" class="success-overlay fixed inset-0 flex items-center justify-center z-50 hidden">
        <div class="text-center">
            <div class="text-6xl animate-check">✅</div>
            <p class="text-xl font-bold mt-4">Сохранено!</p>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        const pipeSelect = document.getElementById('pipe_id');
        const form = document.getElementById('qcForm');
        const overlay = document.getElementById('successOverlay');
        const blockSand = document.getElementById('block-sand');
        const blockApproval = document.getElementById('block-approval');
        const blockGeometry = document.getElementById('block-geometry');
        const blockFinal = document.getElementById('block-final');
        const pipeInfo = document.getElementById('pipeInfo');
        let currentDN = null;
        let pipeLoaded = false;
        const SAND_STATUSES = ['winder', 'winder_drying'];
        const APPROVAL_STATUSES = ['waiting_qc_approval'];
        const GEOMETRY_STATUSES = ['turning', 'extraction', 'qc_final'];
        const FINAL_STATUSES = ['qc_final'];

        pipeSelect.addEventListener('change', async () => {
            const pipeId = pipeSelect.value;
            if (!pipeId) return;
            try {
                const resp = await fetch('/api/qc/pipe/' + pipeId);
                const data = await resp.json();
                if (data.error) { tg.showAlert(data.error); return; }
                const status = data.status;
                currentDN = data.dn;
                document.getElementById('infoStatus').textContent = status;
                document.getElementById('infoDN').textContent = currentDN || '—';
                pipeInfo.classList.remove('hidden');
                blockSand.style.display = 'none';
                blockApproval.style.display = 'none';
                blockGeometry.style.display = 'none';
                blockFinal.style.display = 'none';
                if (SAND_STATUSES.includes(status)) blockSand.style.display = 'block';
                if (APPROVAL_STATUSES.includes(status)) blockApproval.style.display = 'block';
                if (GEOMETRY_STATUSES.includes(status)) blockGeometry.style.display = 'block';
                if (FINAL_STATUSES.includes(status)) blockFinal.style.display = 'block';
                if (data.passport) {
                    const p = data.passport;
                    setVal('sand_layer_1_mm', p.sand_layer_1_mm);
                    setVal('sand_layer_2_mm', p.sand_layer_2_mm);
                    if (p.turning_approved) document.getElementById('turning_approved').checked = true;
                    setVal('pipe_circumference_mm', p.pipe_circumference_mm);
                    setVal('bell_circumference_mm', p.bell_circumference_mm);
                    setVal('bell_wall_thickness_mm', p.bell_wall_thickness_mm);
                    setVal('nipple_outer_diameter_mm', p.nipple_outer_diameter_mm);
                    setVal('channel_diameter_1_mm', p.channel_diameter_1_mm);
                    setVal('channel_diameter_2_mm', p.channel_diameter_2_mm);
                    setVal('channel_depth_mm', p.channel_depth_mm);
                    setVal('channel_width_mm', p.channel_width_mm);
                    setVal('machined_length_mm', p.machined_length_mm);
                    setVal('wall_thickness_mm', p.wall_thickness_mm);
                    if (p.visual_inspection_notes) document.getElementById('visual_inspection_notes').value = p.visual_inspection_notes;
                    if (p.final_verdict) document.getElementById('final_verdict').value = p.final_verdict;
                }
                document.getElementById('inner_dn_mm').value = currentDN || '';
                recalcWall();
                pipeLoaded = true;
                tg.MainButton.setText("СОХРАНИТЬ");
                tg.MainButton.show();
            } catch (err) { tg.showAlert('Ошибка загрузки: ' + err.message); }
        });

        document.getElementById('outer_dn_mm').addEventListener('input', recalcWall);
        function recalcWall() {
            const outer = parseFloat(document.getElementById('outer_dn_mm').value);
            const inner = currentDN;
            document.getElementById('wall_thickness_mm').value = (outer && inner) ? ((outer - inner) / 2).toFixed(2) : '';
        }
        function setVal(id, value) { if (value !== null && value !== undefined) document.getElementById(id).value = value; }
        function getVal(id) { const el = document.getElementById(id); return el && el.value !== '' ? parseFloat(el.value) : null; }

        tg.MainButton.onClick(async function () {
            tg.MainButton.showProgress();
            if (!form.reportValidity()) { tg.MainButton.hideProgress(); return; }
            const telegramId = tg.initDataUnsafe?.user?.id;
            if (!telegramId) { tg.MainButton.hideProgress(); tg.HapticFeedback.notificationOccurred('error'); tg.showAlert('Ошибка: не удалось получить Telegram ID.'); return; }
            const data = { pipe_id: parseInt(pipeSelect.value), telegram_id: telegramId };
            if (blockSand.style.display !== 'none') { data.sand_layer_1_mm = getVal('sand_layer_1_mm'); data.sand_layer_2_mm = getVal('sand_layer_2_mm'); }
            if (blockApproval.style.display !== 'none') { data.turning_approved = document.getElementById('turning_approved').checked; }
            if (blockGeometry.style.display !== 'none') {
                data.pipe_circumference_mm = getVal('pipe_circumference_mm'); data.bell_circumference_mm = getVal('bell_circumference_mm');
                data.outer_dn_mm = getVal('outer_dn_mm'); data.wall_thickness_mm = getVal('wall_thickness_mm');
                data.bell_wall_thickness_mm = getVal('bell_wall_thickness_mm'); data.nipple_outer_diameter_mm = getVal('nipple_outer_diameter_mm');
                data.channel_diameter_1_mm = getVal('channel_diameter_1_mm'); data.channel_diameter_2_mm = getVal('channel_diameter_2_mm');
                data.channel_depth_mm = getVal('channel_depth_mm'); data.channel_width_mm = getVal('channel_width_mm');
                data.machined_length_mm = getVal('machined_length_mm');
            }
            if (blockFinal.style.display !== 'none') { data.visual_inspection_notes = document.getElementById('visual_inspection_notes').value || null; data.final_verdict = document.getElementById('final_verdict').value || null; }
            try {
                const resp = await fetch('/api/qc', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (!resp.ok) throw new Error(`Ошибка: ${resp.status}`);
                tg.MainButton.hideProgress(); tg.HapticFeedback.notificationOccurred('success');
                overlay.classList.remove('hidden'); setTimeout(() => tg.close(), 1200);
            } catch (err) {
                tg.MainButton.hideProgress(); tg.HapticFeedback.notificationOccurred('error'); tg.showAlert('Ошибка при сохранении данных!');
            }
        });
    </script>
</body>

</html>
